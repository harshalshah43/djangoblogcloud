{% extends 'blog/base.html' %}
{% load static %}

{% block content %}

<div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-md">
    
    <h1 class="text-3xl font-bold mb-4">{{ article.title }}</h1>

    <p class="text-gray-500 text-sm mb-2">
        By {{ article.author }} • {{ article.created_at }}
    </p>

    {% if article.image %}
        <img src="{{ article.image.url }}" class="w-full rounded-xl mb-4">
    {% endif %}

    <div class="text-gray-700 leading-relaxed">
        {{ article.content }}
    </div>

    {% if user.is_authenticated and user == article.author %}
    <div class="mt-6 flex justify-center gap-4">
        <a href="{% url 'update-article' article.id %}"
           class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-400 transition">
            Edit
        </a>
        <a href="{% url 'delete-article' article.id %}"
           class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-300 transition">
            Delete
        </a>
    </div>
    {% endif %}

</div>

{% endblock %}
