{% extends "blog/base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-6xl shadow-md">

        <!-- ===== PROFILE DISPLAY ===== -->
        <div class="text-center">

            <!-- <div class="flex justify-center mb-4">
                <img src="{{ user.profile.image.url }}" 
                    class="w-32 h-32 rounded-full object-cover border-4 border-indigo-500 shadow-md">
            </div> -->

            <h2 class="text-2xl font-bold text-indigo-600 mb-1">
                Create New Article
            </h2>

            <!-- <p class="text-gray-600">
                {{ user.email }}
            </p> -->

        </div>

        <!-- Divider -->
        <!-- <div class="border-t my-6"></div> -->

        <!-- ===== UPDATE FORM ===== -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Username -->
            <!-- <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Username
                </label>
                {{ u_form.username }}
            </div> -->

            <!-- Title -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Title
                </label>
                {{ form.title }}
            </div>

            <!-- Content -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Content
                </label>
                {{ form.content }}
            </div>

            <!-- Category -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Category
                </label>
                {{ form.category }}
            </div>

            <!-- Image -->
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">
                    Image Attactment
                </label>
                {{ form.image }}
            </div>

            <!-- Submit -->
            <div class="flex justify-center mt-6">
                <button type="submit"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
                    Save Changes
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
