<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ title }}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <!-- Logo -->
            <a href="{% url 'blog-home' %}" class="text-2xl font-bold text-indigo-600">
                Blog Space
            </a>

            <!-- Right Section -->
            <div class="flex items-center space-x-8">

                <!-- Navigation Links -->
                <div class="hidden md:flex space-x-6 text-gray-700">
                    {% if user.is_authenticated %}
                    <a href = "{% url 'create-article' %}" class="hover:text-indigo-600">Post New Article</a>
                    <a href = "{% url 'article-view' %}" class="hover:text-indigo-600">My Articles</a>
                    {% endif %}
                    <a href="{% url 'blog-home' %}" class="hover:text-indigo-600">Home</a>
                    <a href="/blog/about" class="hover:text-indigo-600">About</a>
                    <a href="#" class="hover:text-indigo-600">Careers</a>
                </div>

                {% if user.is_authenticated %}
                <!-- User Section -->
                <div class="flex items-center space-x-4">
                    <!-- Profile Image -->
                    <a href="{% url 'profile' %}">
                        <img 
                            src="{{ user.profile.image.url|default:'/static/images/default.png' }}" 
                            alt="Profile"
                            class="w-10 h-10 rounded-full object-cover border-2 border-indigo-500 hover:scale-105 transition">
                    </a>

                    <!-- Username -->
                    <span class="hidden md:block text-gray-700 font-medium">
                        {{ user.username }}
                    </span>

                    <!-- Logout -->
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button 
                            type="submit"
                            class="text-sm text-red-500 hover:text-red-600 font-medium">
                            Logout
                        </button>
                    </form>

                </div>

                {% else %}
                <!-- Auth Links -->
                <div class="flex items-center space-x-4">
                    <a href="{% url 'login' %}" class="hover:text-indigo-600">Login</a>
                    <a href="{% url 'register' %}" 
                       class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                        Register
                    </a>
                </div>
                {% endif %}

            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
