{% extends "blog/base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md text-center">

        <h2 class="text-2xl font-bold text-indigo-600 mb-4">
            You have been logged out
        </h2>

        <p class="text-gray-600 mb-6">
            Thanks for visiting. We hope to see you again soon!
        </p>

        <!-- Login Again Button -->
        <a href="{% url 'login' %}"
           class="block w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
            Login Again
        </a>

        <!-- Optional Home Redirect -->
        <a href="{% url 'blog-home' %}"
           class="block mt-3 text-indigo-600 hover:underline">
            Go to Home
        </a>

    </div>

</div>

{% endblock %}
