<!-- registration/password_reset_complete.html -->
{% extends "blog/base.html" %}
{% block content %}

<div class="max-w-lg mx-auto mt-20 bg-white shadow-lg rounded-2xl p-8 text-center">

    <div class="text-5xl mb-4">✅</div>

    <h2 class="text-3xl font-bold text-indigo-600 mb-3">
        Password Reset Successful
    </h2>

    <p class="text-gray-600 mb-6">
        Your password has been updated successfully.
        You can now log in using your new password.
    </p>

    <a href="{% url 'login' %}"
       class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 transition">
        Login Now
    </a>

</div>

{% endblock %}
