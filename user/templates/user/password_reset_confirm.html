<!-- registration/password_reset_confirm.html -->
{% extends "blog/base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-16 bg-white shadow-lg rounded-2xl p-8">

    <h2 class="text-3xl font-bold text-center text-indigo-600 mb-3">
        Set New Password
    </h2>

    <p class="text-gray-500 text-center mb-6">
        Please enter your new password twice so we can verify it.
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="space-y-4 mb-6">
            {{ form.as_p }}
        </div>

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition font-medium">
            Update Password
        </button>
    </form>

</div>

{% endblock %}
