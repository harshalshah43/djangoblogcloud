<!-- registration/password_reset_form.html -->
{% extends "blog/base.html" %}
{% block content %}

<div class="max-w-md mx-auto mt-16 bg-white shadow-lg rounded-2xl p-8">
    <h2 class="text-3xl font-bold text-center text-indigo-600 mb-3">
        Reset Password
    </h2>

    <p class="text-gray-500 text-center mb-6">
        Enter your email address and we'll send you a link to reset your password.
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Email Address
            </label>
            {{ form.email }}
        </div>

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition font-medium">
            Send Reset Link
        </button>
    </form>
</div>

{% endblock %}
